name: Daily submodule update

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC daily (~15:00 KST)
  workflow_dispatch:       # manual trigger from Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout aggregator with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Bump submodule pointers
        id: bump
        run: |
          git submodule update --remote --recursive
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No submodule updates."
            exit 0
          fi
          echo "changed=true" >> "$GITHUB_OUTPUT"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: daily submodule bump ($(date -u +%Y-%m-%d))"

      - name: Push
        if: steps.bump.outputs.changed == 'true'
        run: git push
